# =============================================================================
#  Revolute — page content
# =============================================================================
#  Everything on the page is described here. No HTML. To edit copy, just change
#  the text. To add / remove / reorder a section, add / remove / move a block
#  under `sections:` — the page and the sidebar Table of Contents both follow
#  this file's order automatically. Section numbers (01, 02, …) are automatic.
#
#  Each section has a `type` that decides how it's rendered:
#     prose    – one or more paragraphs (the `body` list)
#     list     – simple bullet points (the `items` list)
#     schedule – days, each with timed rows
#     cards    – tagged items with a title, optional link, and note
#     faq      – expandable question / answer pairs
#     table    – comparison grid (`columns` across the top, `rows` down the side)
#     people   – grid of profiles (name, title, optional affiliation/photo/url/bio)
#     sponsors – logo wall, optionally grouped into tiers
#  A `prose` section may also carry optional `facts`, `button`, and/or `note_box` blocks.
#  A `cards` section may also carry an optional `links` disclosure block.
#  Any section may carry an optional `bg_image` — a faded illustration behind
#  the page content (desktop only), a filename in content/images/.
# =============================================================================

# ---- Masthead / hero --------------------------------------------------------
title: "Boston's first robotics+physical AI hackathon"
version: "v1.08"
# `kicker` renders in the header (desktop only), not here.
kicker: "Aug. 1-2, 2026 // FabLab Kendall, Cambridge"
dek: "$15k of real robot hardware, <br>30 real-life participants, <br>2 days of real fun."
#description: "Revolute is Boston's first robotics+physical AI hackathon."
# og_image: "hackathon.png"
apply_url: "https://luma.com/kxq4yxr8"

# Footer lines, shown at the very bottom of the page. One paragraph per item.
footer:
  - "Revolute v1.08"

# One supporting line under the dek.
#intro:
#  - "A two-day, in-person weekend for builders, engineers, researchers, and the robotics-curious. No robotics background required."

# ---- Sections ---------------------------------------------------------------
#  Order here = order on the page = order in the sidebar ToC.
sections:

  - id: details
    title: Details
    type: prose
    # Fact tiles shown at the top of this section. Add/remove a label:/value: pair.
    facts:
      - label: "When"
        value: "Aug. 1-2, 2026"
      - label: "Where"
        value: '<a href="https://fabhubkendall.fabfoundation.org/">FabLab Kendall</a>, Cambridge, MA'
      - label: "Theme"
        value: "Cooking with robot arms"
      - label: "Apply"
        value: '<a href="https://luma.com/kxq4yxr8">Apply on Luma</a>'
      #- label: "Teams"
        #value: "Solo, with friends, or preformed"
      #- label: "Bring"
        #value: "A laptop. Setup notes sent beforehand."
    body:
      - "Each team gets a robot arm and leader arm -- more details in the Hardware section below.."
      - "The goals: 1. Have fun; 2. Learn something new; and 3. Build something awesome! Or at least somewhat edible 😋"
      - "Teams should include at least one person familiar with hardware, software, or robotics."
      - "We’ll also have at least $1,000 in prizes, and all food is included."
      - "Our main goal is not just competition -- it's to build Boston into the forefront of the robotics + physical AI community."

    # Logo band shown at the end of this section. Each group has a small-caps
    # `label` and one or more logos; a logo is either an image (`img`, on a
    # white chip) or an inline SVG (`svg`, tinted to the accent color).
    # `url` and `sub` (a subtitle line) are optional.
    partners:
      - label: "Hosted by"
        logos:
          - img: "fabfoundation.png"
            alt: "Fab Foundation"
            url: "https://fabfoundation.org/"
      - label: "Sponsored by"
        logos:
          - img: "seeedstudio.png"
            alt: "Seeed Studio"
            url: "https://www.seeedstudio.com/?__vid=260630"
      - label: "Partners"
        logos:
          - svg: "miters.svg"
            alt: "MITERS"
            url: "https://miters.mit.edu/"
            sub: "Boston Robot Hackers"

  - id: hardware
    title: Hardware
    type: cards
    bg_image: "rebot_gemini.png"
    intro: '<a href="https://www.seeedstudio.com/?__vid=260630">Seeed Studio</a> is providing the robot hardware. Approximate inventory (subject to change):'
    cards:
      - tag: "1x"
        title: "reBot Arm B601 RS"
        url: "https://www.seeedstudio.com/reBot-Arm-B601-RS-Assembled-Kit-with-Gripper-p-6865.html"
        note: "One robot arm per team. Features 48V QDD motors, a 2.5 kg rated payload, a 5 kg maximum payload, and a working radius of approximately 29 inches."
      - tag: "1x"
        title: "reComputer Jetson Orin Nano, 8GB"
        url: "https://www.seeedstudio.com/reComputer-J3011-p-5590.html"
        note: "Edge compute for inference, one per team."
      - tag: "2x"
        # `title_html` lets you use links/markup inside the title when needed.
        #title_html: '<a href="https://www.seeedstudio.com/X10-USB-wired-camera-p-6506.html">X10 USB Camera</a> and <a href="https://www.seeedstudio.com/ET-S231-90-USB-Camera-p-6684.html">ET-S231 Webcam Module</a>'
        title: USB camera
        note: "Overhead and wrist cameras"
      - tag: "1x"
        title: "Leader arm for reBot"
        note: For teleoperations and imitation learning.

  - id: schedule
    title: Schedule
    type: schedule
    intro: "Subject to change."
    days:
      - label: "Saturday, Aug. 1"
        rows:
          - when: "10:00 AM"
            what: "Intro tutorial"
            #note: "Find a table, meet people, get oriented, and get started."
          - when: "12:01 PM"
            what: "Opening ceremony"
            #note: "Theme, safety, judging, and hardware rules."
          - when: "1:00 PM"
            what: "Lunch and office hours"
            note: "Form teams, mentors available for setup."
          - when: "2:00 PM"
            what: "Hacking begins"
            #note: "Setup, data collection, scripts, fixtures, training, and demos."
          - when: "6:15 PM"
            what: "Intermission: Dinner"
          - when: "10:00 PM"
            what: "Hacking ends for the day"
      - label: "Sunday, Aug. 2"
        rows:
          - when: "10:00 AM"
            what: "Doors open, breakfast bites"
          - when: "12:01 PM"
            what: "Lunch"
          - when: "3:00 PM"
            what: "Science-fair style demos and judging"
            note: "Judges will go around to tables for demos."
          - when: "4:00 PM"
            what: "Final submissions"
            note: "Github, project documentation, and one-minute video submitted online"
          - when: "4:15 PM"
            what: "Awards"
          - when: "4:30 PM"
            what: "Light snacks and social"
          - when: "5 PM"
            what: "That's a wrap!"

