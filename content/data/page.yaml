# ---- Sections ---------------------------------------------------------------
#  Order here = order on the page = order in the sidebar ToC.
sections:

  - id: overview
    title: The Hackathon
    type: prose
    body:
      - "Bring AI into the physical world!"
      - "Revolute is a two-day in-person hackathon where each team of 4-5 will be given one robot arm. The theme for v1.08 is: Cooking!"
      - "The goals: 1. have fun 2. learn something new and 3. build something awesome."
      - "Teams should have at least one person familiar with hardware, software, and/or robotics."

  - id: hardware
    title: Hardware
    type: cards
    intro: '<a href="https://www.seeedstudio.com/?__vid=260630">Seeed Studio</a> is providing the robot hardware. Approximate inventory (subject to change):'
    cards:
      - tag: "1x"
        title: "reBot Arm B601 DM"
        url: "https://www.seeedstudio.com/reBot-Arm-B601-DM-p-6740.html"
        note: "One robot arm per team."
      - tag: "1x"
        title: "reComputer Jetson Orin Nano, 8GB"
        url: "https://www.seeedstudio.com/reComputer-J3011-p-5590.html"
        note: "Edge compute for inference, one per team."
      - tag: "1x"
        # `title_html` lets you use links/markup inside the title when needed.
        title_html: '<a href="https://www.seeedstudio.com/X10-USB-wired-camera-p-6506.html">X10 USB Camera</a> and <a href="https://www.seeedstudio.com/ET-S231-90-USB-Camera-p-6684.html">ET-S231 Webcam Module</a>'
        note: "Overhead and wrist cameras"
      - tag: "Possibly"
        title: "Star leader arm"

  - id: schedule
    title: Schedule
    type: schedule
    intro: "Subject to change."
    days:
      - label: "Saturday, Aug. 1"
        rows:
          - when: "9:00 AM"
            what: "Intro tutorial"
            #note: "Find a table, meet people, get oriented, and get started."
          - when: "12:01 PM"
            what: "Opening ceremony"
            #note: "Theme, safety, judging, and hardware rules."
          - when: "1:00 PM"
            what: "Lunch and office hours"
            note: "Form teams, mentors available for setup."
          - when: "2:00 PM"
            what: "Hacking begins"
            #note: "Setup, data collection, scripts, fixtures, training, and demos."
          - when: "6:15 PM"
            what: "Intermission: Dinner"
          - when: "10:00 PM"
            what: "Hacking ends for the day"
      - label: "Sunday, Aug. 2"
        rows:
          - when: "8:00 AM"
            what: "Doors open, breakfast bites"
          - when: "12:01 PM"
            what: "Lunch"
          - when: "3:00 PM"
            what: "Science-fair style demos and judging"
            note: "Judges will go around to tables for demos."
          - when: "4:00 PM"
            what: "Final submissions"
            note: "Github, project documentation, and one-minute video submitted online"
          - when: "4:15 PM"
            what: "Awards"
          - when: "4:30 PM"
            what: "Light snacks and social"
          - when: "5 PM"
            what: "That's a wrap!"

  #- id: judging
    #title: Judging and Prizes
    #type: prose
    #body:
      #- "Science-fair style: judges walk around, talk with teams, and watch demos, scoring on completion, technical implementation, creativity, and what the team learned."
      #- "Prizes are TBA — expect practical maker rewards such as hardware, credits, gift cards, and tools."

  - id: apply
    title: Sign-Up Form 
    type: prose
    body:
      - "Interested in attending, sponsoring, mentoring, or judging? Fill out the form below while we set up Luma."
    button:
      label: "Sign-up Form"
      url: "https://docs.google.com/forms/d/e/1FAIpQLSeVBl7Q7HjIDip8C7H7l2KwT6T9Buy4RfkJa64CLngNDVa9xw/viewform"
    note_box:
      - '<strong>Confirmed sponsor:</strong> <a href="https://www.seeedstudio.com/?__vid=260630">Seeed Studio</a>. Sponsor benefits include logo placement and a short speaking slot.'

  - id: faq
    title: FAQ
    type: faq
    items:
      #- q: "Can I apply without a team?"
        #a: "Yes — apply solo, with friends, or as a preformed team. Teams can also form at the event."
        #open: true
      - q: "What is Revolute?"
        a: 'The name for this recurring Boston physical AI hackathon — "Boston Embodied / Physical AI Robot Hackathon" was too much of a mouthful.'
        open: true

  - id: credits
    title: Credits and Inspiration
    type: cards
    cards:
      - tag: "Format"
        title: "Robot Hackathon NYC"
        url: "https://www.robothackathon.com/"
