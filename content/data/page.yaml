# =============================================================================
#  Revolute — page content
# =============================================================================
#  Everything on the page is described here. No HTML. To edit copy, just change
#  the text. To add / remove / reorder a section, add / remove / move a block
#  under `sections:` — the page and the sidebar Table of Contents both follow
#  this file's order automatically. Section numbers (01, 02, …) are automatic.
#
#  Each section has a `type` that decides how it's rendered:
#     prose    – one or more paragraphs (the `body` list)
#     list     – simple bullet points (the `items` list)
#     schedule – days, each with timed rows
#     cards    – tagged items with a title, optional link, and note
#     faq      – expandable question / answer pairs
#  A `prose` section may also carry an optional `button` and/or `note_box`.
#  A `cards` section may also carry an optional `links` disclosure block.
# =============================================================================

# ---- Masthead / hero --------------------------------------------------------
title: "Boston's first physical AI hackathon"
version: "v1.08"
kicker: "Aug. 1-2, 2026 // FabLab Kendall, Cambridge"
dek: "$15k of real robot hardware, <br>30 real-life participants, <br>2 days of real fun."
#description: "Revolute is Boston's first physical AI hackathon."
# og_image: "hackathon.png"
apply_url: "https://luma.com/kxq4yxr8"

# Footer lines, shown at the very bottom of the page. One paragraph per item.
footer:
  - "Revolute v1.08"

# One supporting line under the dek.
#intro:
#  - "A two-day, in-person weekend for builders, engineers, researchers, and the robotics-curious. No robotics background required."

