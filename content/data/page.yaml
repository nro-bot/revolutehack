  # ---- Sponsors -------------------------------------------------------------
  #  A `sponsors` section shows logos, optionally grouped into tiers. Each tier
  #  has an optional `label` (e.g. "Gold") and a `size` controlling how large
  #  the logos render: "lg", "md" (default), or "sm". A logo is an image
  #  (`img`, white chip), an inline SVG (`svg`, accent-tinted), or just a
  #  `name` (text) when there's no logo yet. `url` is optional on any of them.
  #  To skip tiers entirely, use a single tier with no `label`.
  - id: sponsors
    title: Sponsors
    type: sponsors
    intro: 'Revolute is made possible by our sponsors. Interested in joining them? See our <a href="/sponsorship/">sponsorship tiers</a> and reach out to <a href="mailto:revolutehack@gmail.com">revolutehack@gmail.com</a>.'
    tiers:
      # Tier labels commented out below to hide them on the page while
      # staying documented for editors.
      #label: "Gold"
      - size: lg
        logos:
          - img: "seeedstudio.png"
            alt: "Seeed Studio"
            url: "https://www.seeedstudio.com/?__vid=260630"
      # Placeholders — swap in real sponsor logos as they're confirmed (or
      # delete the tier if there aren't any yet).
      #label: "Supporting"
      - size: md
        logos:
          - name: "Sponsor [awaiting MIT approval]"
          - name: "Sponsor [awaiting MIT approval]"

